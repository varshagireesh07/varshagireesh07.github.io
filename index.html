<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsha Gireesh | Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --mint-bg: #f5fff9;       
            --mint-card: #ffffff;     
            --mint-accent: #48b38d;   
            --mint-soft: #d1f2e6;     
            --text-main: #1d332c;     
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--mint-bg);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'DM Serif Display', serif; }

        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 1.2rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(245, 255, 249, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid rgba(72, 179, 141, 0.1);
        }

        .logo { font-size: 1.6rem; font-weight: 700; color: var(--mint-accent); }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 160px 10% 100px;
            min-height: 100vh;
            gap: 50px;
        }

        .hero-content { flex: 1.5; }
        
        /* Single line name styling */
        .hero-content h1 { 
            font-size: 4.5rem; 
            white-space: nowrap; 
            margin-bottom: 1.5rem; 
            color: var(--text-main); 
        }

        .hero-content p { font-size: 1.2rem; margin-bottom: 2.5rem; opacity: 0.8; max-width: 600px; }

        /* Pill Photo Container */
        .hero-image { flex: 1; display: flex; justify-content: center; position: relative; }
        
        .pill-frame {
            width: 320px;
            height: 460px;
            background: var(--mint-soft);
            border-radius: 160px; 
            overflow: hidden;
            border: 10px solid white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            position: relative;
        }

        .pill-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .badge {
            position: absolute;
            bottom: 40px;
            right: -10px;
            background: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            color: var(--mint-accent);
            border: 1px solid var(--mint-soft);
        }

        /* Buttons */
        .cta-button {
            padding: 16px 40px;
            background: var(--mint-accent);
            color: white;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            transition: 0.4s;
            display: inline-block;
        }

        .cta-button:hover {
            background: var(--text-main);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .section-padding { padding: 80px 10%; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: var(--mint-card);
            padding: 35px;
            border-radius: 25px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .card:hover {
            background: var(--mint-soft);
            border-color: var(--mint-accent);
        }

        .card i { font-size: 2.2rem; color: var(--mint-accent); margin-bottom: 15px; }

        /* Responsive adjustments */
        @media (max-width: 1100px) {
            .hero-content h1 { font-size: 3.5rem; }
        }

        @media (max-width: 900px) {
            .hero { flex-direction: column-reverse; text-align: center; padding-top: 120px; }
            .hero-content h1 { font-size: 2.8rem; white-space: normal; } 
            .hero-content p { margin: 0 auto 2rem; }
            .pill-frame { width: 260px; height: 380px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VG.</div>
        <a href="https://wa.me/918714719899" class="cta-button" style="padding: 10px 25px; font-size: 0.85rem;">Let's Chat</a>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Varsha Gireesh</h1>
                <p>Engineering student crafting ideas into code | Tech enthusiast | Lifelong learner.</p>
                <a href="#connect" class="cta-button">My Social Links</a>
            </div>
            
            <div class="hero-image">
                <div class="pill-frame">
                    <img src="image.jfif" alt="Varsha Gireesh Photo">
                </div>
                <div class="badge">CSE · AI Student</div>
            </div>
        </section>

        <section id="connect" class="section-padding">
            <h2 style="text-align: center;">Let's Connect</h2>
            <div class="grid">
                <a href="https://www.linkedin.com/in/varshagireesh07" class="card" target="_blank">
                    <i class="fab fa-linkedin-in"></i>
                    <h3>LinkedIn</h3>
                </a>
                <a href="https://wa.me/918714719899" class="card" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                    <h3>WhatsApp</h3>
                </a>
                <a href="https://instagram.com/varsha_09dec" class="card" target="_blank">
                    <i class="fab fa-instagram"></i>
                    <h3>Instagram</h3>
                </a>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 40px; opacity: 0.5;">
        <p>© 2026 Varsha Gireesh</p>
    </footer>

</body>
</html>
