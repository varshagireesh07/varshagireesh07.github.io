<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsha Gireesh | Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --mint-bg: #f5fff9;       /* Light Pastel Mint Background */
            --mint-card: #ffffff;     /* White for cards */
            --mint-accent: #48b38d;   /* Primary Mint Green */
            --mint-soft: #d1f2e6;     /* Light Green for hover/badges */
            --text-main: #1d332c;     /* Deep Green-Black for text */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--mint-bg);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 { font-family: 'DM Serif Display', serif; }

        /* Fixed Navigation */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 1.2rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(245, 255, 249, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid rgba(72, 179, 141, 0.1);
        }

        .logo { font-size: 1.6rem; font-weight: 700; color: var(--mint-accent); }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 160px 10% 100px;
            min-height: 100vh;
            gap: 50px;
        }

        .hero-content { flex: 1.2; }
        .hero-content h1 { font-size: 5rem; line-height: 1; margin-bottom: 1.5rem; color: var(--text-main); }
        .hero-content p { font-size: 1.3rem; margin-bottom: 2.5rem; opacity: 0.8; max-width: 500px; }

        /* THE PILL PHOTO FRAME */
        .hero-image { flex: 1; display: flex; justify-content: center; position: relative; }
        
        .pill-frame {
            width: 340px;
            height: 480px;
            background: var(--mint-soft);
            border-radius: 170px; /* Pill Shape */
            overflow: hidden;
            border: 10px solid white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            position: relative;
        }

        .pill-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .badge {
            position: absolute;
            bottom: 50px;
            right: 0;
            background: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            color: var(--mint-accent);
            border: 1px solid var(--mint-soft);
        }

        /* Buttons & Options */
        .cta-button {
            padding: 16px 40px;
            background: var(--mint-accent);
            color: white;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 700;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .cta-button:hover {
            background: var(--text-main);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        /* Skills/Connect Section */
        .section-padding { padding: 100px 10%; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background: var(--mint-card);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .card:hover {
            background: var(--mint-soft);
            border-color: var(--mint-accent);
            transform: scale(1.02);
        }

        .card i { font-size: 2.5rem; color: var(--mint-accent); margin-bottom: 15px; }

        /* Responsive Fixes */
        @media (max-width: 1024px) {
            .hero { flex-direction: column-reverse; text-align: center; padding-top: 120px; }
            .hero-content h1 { font-size: 3.5rem; }
            .hero-content p { margin: 0 auto 2rem; }
            .pill-frame { width: 280px; height: 400px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VG.</div>
        <a href="https://wa.me/918714719899" class="cta-button" style="padding: 10px 25px; font-size: 0.85rem;">Let's Chat</a>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Varsha<br>Gireesh</h1>
                <p>Engineering student crafting ideas into code | Tech enthusiast | Lifelong learner.</p>
                <a href="#connect" class="cta-button">Explore My Work</a>
            </div>
            
            <div class="hero-image">
                <div class="pill-frame">
                    <img src="image.jfif" alt="Varsha Gireesh Profile Photo">
                </div>
                <div class="badge">CSE · AI Student</div>
            </div>
        </section>

        <section id="connect" class="section-padding">
            <h2 style="text-align: center; font-size: 2.5rem;">My Social Links</h2>
            <div class="grid">
                <a href="https://www.linkedin.com/in/varshagireesh07" class="card" target="_blank">
                    <i class="fab fa-linkedin-in"></i>
                    <h3>LinkedIn</h3>
                    <p>Network & Career</p>
                </a>
                <a href="https://wa.me/918714719899" class="card" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                    <h3>WhatsApp</h3>
                    <p>Instant Message</p>
                </a>
                <a href="https://instagram.com/varsha_09dec" class="card" target="_blank">
                    <i class="fab fa-instagram"></i>
                    <h3>Instagram</h3>
                    <p>Daily Updates</p>
                </a>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 60px; opacity: 0.5; font-size: 0.9rem;">
        <p>© 2026 Varsha Gireesh | Built with Minty Fresh Code</p>
    </footer>

</body>
</html>
